services:
  - type: web
    name: lovesta
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false        # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false        # Set manually in Render dashboard
      - key: DATABASE_URL
        sync: false        # Paste your Neon / Supabase PostgreSQL URL
