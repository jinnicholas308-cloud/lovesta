<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Lovesta{% endblock %} — Lovesta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: { 50: '#fff1f2', 100: '#ffe4e6', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48' },
            pink: { 50: '#fdf2f8', 100: '#fce7f3', 400: '#f472b6', 500: '#ec4899' }
          },
          fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-rose-50 min-h-screen font-sans text-gray-800">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-rose-100 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="{{ url_for('memories.feed') }}" class="text-2xl font-bold text-rose-500 tracking-tight">
        ♥ Lovesta
      </a>
      {% if current_user.is_authenticated %}
      <div class="flex items-center gap-3">
        <a href="{{ url_for('memories.upload') }}"
           class="bg-rose-500 hover:bg-rose-600 text-white text-sm font-medium px-4 py-1.5 rounded-full transition">
          + 추억 업로드
        </a>
        <a href="{{ url_for('couple.info') }}" class="text-gray-500 hover:text-rose-500 text-sm transition">
          💑 커플
        </a>
        <a href="{{ url_for('auth.logout') }}" class="text-gray-400 hover:text-gray-600 text-sm transition">
          로그아웃
        </a>
      </div>
      {% endif %}
    </div>
  </nav>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="max-w-4xl mx-auto px-4 mt-4 space-y-2">
      {% for category, message in messages %}
      <div class="px-4 py-3 rounded-lg text-sm font-medium
        {% if category == 'error' %}bg-red-100 text-red-700 border border-red-200
        {% elif category == 'success' %}bg-green-100 text-green-700 border border-green-200
        {% elif category == 'warning' %}bg-yellow-100 text-yellow-700 border border-yellow-200
        {% else %}bg-blue-100 text-blue-700 border border-blue-200{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
  {% endwith %}

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
