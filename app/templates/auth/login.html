{% extends 'base.html' %}
{% block title %}로그인{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">♥</div>
      <h1 class="text-2xl font-bold text-gray-800">Lovesta</h1>
      <p class="text-gray-500 text-sm mt-1">우리의 추억을 함께 기록해요</p>
    </div>

    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
        <input type="email" name="email" required
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition"
               placeholder="example@email.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input type="password" name="password" required
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition"
               placeholder="비밀번호를 입력하세요" />
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" name="remember" id="remember" class="rounded" />
        <label for="remember" class="text-sm text-gray-600">로그인 유지</label>
      </div>
      <button type="submit"
              class="w-full bg-rose-500 hover:bg-rose-600 text-white font-medium py-2.5 rounded-xl transition text-sm">
        로그인
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      계정이 없으신가요?
      <a href="{{ url_for('auth.register') }}" class="text-rose-500 hover:text-rose-600 font-medium">회원가입</a>
    </p>
  </div>
</div>
{% endblock %}
