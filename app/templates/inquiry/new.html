{% extends 'base.html' %}
{% block title %}새 문의{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-rose-50 p-6 slide-up">
    <h1 class="text-xl font-bold gradient-text mb-6">문의하기</h1>

    <form method="POST" class="space-y-5">

      <!-- Category -->
      <div>
        <label for="category" class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-widest">
          카테고리 <span class="text-rose-400">*</span>
        </label>
        <select id="category" name="category"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition bg-white"
                onchange="toggleLimitNote()">
          {% for key, label in categories.items() %}
          <option value="{{ key }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Increase limit note -->
      <div id="limitNote" class="hidden bg-rose-50 border border-rose-200 rounded-xl px-4 py-3 text-sm text-rose-600">
        <p class="font-medium mb-1">인원 증설 요청 안내</p>
        <p class="text-xs text-rose-500 leading-relaxed">
          관리자가 요청을 검토한 후 승인 여부를 안내해 드립니다.
          현재 커플 구성, 사유 등을 본문에 상세히 적어주시면 빠른 처리에 도움이 됩니다.
        </p>
      </div>

      <!-- Subject -->
      <div>
        <label for="subject" class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-widest">
          제목 <span class="text-rose-400">*</span>
        </label>
        <input type="text" id="subject" name="subject" required maxlength="200"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition"
               placeholder="문의 제목을 입력하세요" />
      </div>

      <!-- Body -->
      <div>
        <label for="body" class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-widest">
          내용 <span class="text-rose-400">*</span>
        </label>
        <textarea id="body" name="body" required rows="6"
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition resize-none"
                  placeholder="문의 내용을 자세히 적어주세요..."></textarea>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-2">
        <a href="{{ url_for('inquiry.list_inquiries') }}"
           class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition text-sm">
          취소
        </a>
        <button type="submit"
                class="flex-1 gradient-rose text-white font-semibold py-3 rounded-xl transition text-sm shadow-sm hover:opacity-90 active:scale-95">
          문의 보내기
        </button>
      </div>
    </form>
  </div>
</div>

<script>
function toggleLimitNote() {
  var sel = document.getElementById('category');
  var note = document.getElementById('limitNote');
  if (sel.value === 'increase_limit') {
    note.classList.remove('hidden');
  } else {
    note.classList.add('hidden');
  }
}
// 페이지 로드 시에도 체크 (브라우저 뒤로가기 등)
toggleLimitNote();
</script>
{% endblock %}
