{% extends 'base.html' %}
{% block title %}추억 업로드{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-6">📷 추억 기록하기</h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-5" id="uploadForm">

      <!-- Image Preview -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">사진</label>
        <div id="dropzone"
             class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center cursor-pointer hover:border-rose-300 transition relative">
          <input type="file" name="image" id="imageInput" accept="image/*"
                 class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
          <div id="dropzoneText">
            <div class="text-3xl mb-2">🖼️</div>
            <p class="text-sm text-gray-500">클릭하거나 파일을 드래그하세요</p>
            <p class="text-xs text-gray-400 mt-1">PNG, JPG, GIF, WEBP (최대 16MB)</p>
          </div>
          <img id="preview" class="hidden max-h-64 mx-auto rounded-lg object-cover" />
        </div>
      </div>

      <!-- Caption -->
      <div>
        <label for="caption" class="block text-sm font-medium text-gray-700 mb-1">
          캡션 <span class="text-rose-400">*</span>
        </label>
        <textarea id="caption" name="caption" required rows="3"
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition resize-none"
                  placeholder="이 추억을 한 문장으로 표현해보세요..."></textarea>
      </div>

      <!-- Location -->
      <div>
        <label for="location" class="block text-sm font-medium text-gray-700 mb-1">
          장소 <span class="text-gray-400 font-normal">(선택)</span>
        </label>
        <input type="text" id="location" name="location" maxlength="200"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition"
               placeholder="예: 남산서울타워" />
      </div>

      <!-- Memory Date -->
      <div>
        <label for="memory_date" class="block text-sm font-medium text-gray-700 mb-1">
          날짜 <span class="text-gray-400 font-normal">(선택)</span>
        </label>
        <input type="date" id="memory_date" name="memory_date"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition" />
      </div>

      <div class="flex gap-3 pt-2">
        <a href="{{ url_for('memories.feed') }}"
           class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-2.5 rounded-xl transition text-sm">
          취소
        </a>
        <button type="submit"
                class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-medium py-2.5 rounded-xl transition text-sm">
          업로드
        </button>
      </div>
    </form>
  </div>
</div>

<script>
const input = document.getElementById('imageInput');
const preview = document.getElementById('preview');
const dropzoneText = document.getElementById('dropzoneText');

input.addEventListener('change', () => {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.classList.remove('hidden');
      dropzoneText.classList.add('hidden');
    };
    reader.readAsDataURL(file);
  }
});
</script>
{% endblock %}
