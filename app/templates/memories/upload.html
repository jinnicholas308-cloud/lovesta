{% extends 'base.html' %}
{% block title %}추억 업로드{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-rose-50 p-6">
    <h1 class="text-xl font-bold gradient-text mb-6">📷 추억 기록하기</h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-5" id="uploadForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <!-- Media Picker -->
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-2 uppercase tracking-widest">사진 / 동영상</label>

        <!-- 숨긴 파일 인풋 (이미지 + 동영상 모두 허용) -->
        <input type="file" name="media" id="mediaInput"
               accept="image/png,image/jpeg,image/gif,image/webp,video/mp4,video/quicktime,video/avi,video/webm,video/x-matroska,video/x-m4v"
               class="hidden" />

        <!-- 드롭존 -->
        <label for="mediaInput" id="dropzone"
               class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center cursor-pointer hover:border-rose-300 transition block relative overflow-hidden">

          <!-- 기본 안내 텍스트 -->
          <div id="dropzoneText">
            <div class="text-4xl mb-2">🖼️</div>
            <p class="text-sm text-gray-600 font-medium">클릭하거나 파일을 드래그하세요</p>
            <p class="text-xs text-gray-400 mt-1">사진: PNG, JPG, GIF, WEBP</p>
            <p class="text-xs text-gray-400">동영상: MP4, MOV, AVI, WEBM (최대 100MB)</p>
          </div>

          <!-- 이미지 미리보기 -->
          <img id="imgPreview" class="hidden max-h-72 mx-auto rounded-xl object-cover shadow-sm" alt="미리보기" />

          <!-- 동영상 미리보기 -->
          <video id="videoPreview" class="hidden max-h-72 mx-auto rounded-xl shadow-sm"
                 controls playsinline muted></video>

          <!-- 선택된 파일명 -->
          <p id="fileName" class="hidden text-xs text-rose-400 font-medium mt-2"></p>
        </label>
      </div>

      <!-- Caption -->
      <div>
        <label for="caption" class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-widest">
          캡션 <span class="text-rose-400">*</span>
        </label>
        <textarea id="caption" name="caption" required rows="3"
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition resize-none"
                  placeholder="이 추억을 한 문장으로 표현해보세요..."></textarea>
      </div>

      <!-- Location -->
      <div>
        <label for="location" class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-widest">
          장소 <span class="text-gray-400 font-normal normal-case">(선택)</span>
        </label>
        <input type="text" id="location" name="location" maxlength="200"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition"
               placeholder="예: 남산서울타워" />
      </div>

      <!-- Memory Date -->
      <div>
        <label for="memory_date" class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-widest">
          날짜 <span class="text-gray-400 font-normal normal-case">(선택)</span>
        </label>
        <input type="date" id="memory_date" name="memory_date"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition" />
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-2">
        <a href="{{ url_for('memories.feed') }}"
           class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition text-sm">
          취소
        </a>
        <button type="submit" id="submitBtn"
                class="flex-1 gradient-rose text-white font-semibold py-3 rounded-xl transition text-sm shadow-sm hover:opacity-90 active:scale-95">
          ✨ 업로드
        </button>
      </div>
    </form>
  </div>
</div>

<script>
const mediaInput  = document.getElementById('mediaInput');
const imgPreview  = document.getElementById('imgPreview');
const vidPreview  = document.getElementById('videoPreview');
const dzText      = document.getElementById('dropzoneText');
const fileNameEl  = document.getElementById('fileName');
const form        = document.getElementById('uploadForm');
const submitBtn   = document.getElementById('submitBtn');

const IMAGE_TYPES = ['image/png', 'image/jpeg', 'image/gif', 'image/webp'];
const VIDEO_TYPES = ['video/mp4', 'video/quicktime', 'video/avi', 'video/webm',
                     'video/x-matroska', 'video/x-m4v'];

function showPreview(file) {
  if (!file) return;

  // 숨기기
  imgPreview.classList.add('hidden');
  vidPreview.classList.add('hidden');
  fileNameEl.classList.add('hidden');

  const isImage = IMAGE_TYPES.includes(file.type) || /\.(png|jpe?g|gif|webp)$/i.test(file.name);
  const isVideo = VIDEO_TYPES.includes(file.type) || /\.(mp4|mov|avi|webm|mkv|m4v)$/i.test(file.name);

  if (isImage) {
    const reader = new FileReader();
    reader.onload = e => {
      imgPreview.src = e.target.result;
      imgPreview.classList.remove('hidden');
      dzText.classList.add('hidden');
    };
    reader.readAsDataURL(file);
  } else if (isVideo) {
    const url = URL.createObjectURL(file);
    vidPreview.src = url;
    vidPreview.classList.remove('hidden');
    dzText.classList.add('hidden');
    fileNameEl.textContent = '🎬 ' + file.name;
    fileNameEl.classList.remove('hidden');
  }
}

// 파일 선택 → 미리보기
mediaInput.addEventListener('change', () => {
  if (mediaInput.files[0]) showPreview(mediaInput.files[0]);
});

// 드래그 앤 드롭
const dropzone = document.getElementById('dropzone');
['dragenter', 'dragover'].forEach(evt => {
  dropzone.addEventListener(evt, e => {
    e.preventDefault();
    dropzone.classList.add('border-rose-400', 'bg-rose-50');
  });
});
['dragleave', 'drop'].forEach(evt => {
  dropzone.addEventListener(evt, () => {
    dropzone.classList.remove('border-rose-400', 'bg-rose-50');
  });
});
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) {
    // DataTransfer 파일을 input에 설정 (지원 브라우저)
    try {
      const dt = new DataTransfer();
      dt.items.add(file);
      mediaInput.files = dt.files;
    } catch(_) {}
    showPreview(file);
  }
});

// 제출 시 로딩 상태
form.addEventListener('submit', () => {
  submitBtn.disabled = true;
  submitBtn.textContent = '업로드 중...';
  submitBtn.classList.add('opacity-70');
});
</script>
{% endblock %}
