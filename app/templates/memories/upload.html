{% extends 'base.html' %}
{% block title %}추억 업로드{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-6">📷 추억 기록하기</h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-5" id="uploadForm">

      <!-- Image Picker (label 방식 — absolute overlay 제거로 버튼 탭 간섭 없음) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">사진</label>

        <!-- 숨긴 파일 인풋 -->
        <input type="file" name="image" id="imageInput" accept="image/*" class="hidden" />

        <!-- 클릭 가능한 드롭존 (label로 연결) -->
        <label for="imageInput" id="dropzone"
               class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center cursor-pointer hover:border-rose-300 transition block">
          <div id="dropzoneText">
            <div class="text-3xl mb-2">🖼️</div>
            <p class="text-sm text-gray-500">클릭해서 사진 선택</p>
            <p class="text-xs text-gray-400 mt-1">PNG, JPG, GIF, WEBP (최대 16MB)</p>
          </div>
          <img id="preview" class="hidden max-h-64 mx-auto rounded-lg object-cover" />
        </label>
      </div>

      <!-- Caption -->
      <div>
        <label for="caption" class="block text-sm font-medium text-gray-700 mb-1">
          캡션 <span class="text-rose-400">*</span>
        </label>
        <textarea id="caption" name="caption" required rows="3"
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition resize-none"
                  placeholder="이 추억을 한 문장으로 표현해보세요..."></textarea>
      </div>

      <!-- Location -->
      <div>
        <label for="location" class="block text-sm font-medium text-gray-700 mb-1">
          장소 <span class="text-gray-400 font-normal">(선택)</span>
        </label>
        <input type="text" id="location" name="location" maxlength="200"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition"
               placeholder="예: 남산서울타워" />
      </div>

      <!-- Memory Date -->
      <div>
        <label for="memory_date" class="block text-sm font-medium text-gray-700 mb-1">
          날짜 <span class="text-gray-400 font-normal">(선택)</span>
        </label>
        <input type="date" id="memory_date" name="memory_date"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition" />
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-2">
        <a href="{{ url_for('memories.feed') }}"
           class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition text-sm">
          취소
        </a>
        <button type="submit" id="submitBtn"
                class="flex-1 bg-rose-500 hover:bg-rose-600 active:bg-rose-700 text-white font-semibold py-3 rounded-xl transition text-sm shadow-sm">
          ✨ 업로드
        </button>
      </div>
    </form>
  </div>
</div>

<script>
const input    = document.getElementById('imageInput');
const preview  = document.getElementById('preview');
const dzText   = document.getElementById('dropzoneText');
const form     = document.getElementById('uploadForm');
const submitBtn = document.getElementById('submitBtn');

// 사진 선택 → 미리보기
input.addEventListener('change', () => {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.classList.remove('hidden');
    dzText.classList.add('hidden');
  };
  reader.readAsDataURL(file);
});

// 드래그 앤 드롭
const dropzone = document.getElementById('dropzone');
['dragenter', 'dragover'].forEach(evt => {
  dropzone.addEventListener(evt, e => {
    e.preventDefault();
    dropzone.classList.add('border-rose-400', 'bg-rose-50');
  });
});
['dragleave', 'drop'].forEach(evt => {
  dropzone.addEventListener(evt, () => {
    dropzone.classList.remove('border-rose-400', 'bg-rose-50');
  });
});
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) {
    input.files = e.dataTransfer.files;
    const reader = new FileReader();
    reader.onload = ev => {
      preview.src = ev.target.result;
      preview.classList.remove('hidden');
      dzText.classList.add('hidden');
    };
    reader.readAsDataURL(file);
  }
});

// 제출 시 로딩 상태
form.addEventListener('submit', () => {
  submitBtn.disabled = true;
  submitBtn.textContent = '업로드 중...';
  submitBtn.classList.add('opacity-70');
});
</script>
{% endblock %}
